<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flipkart Voice Support</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', sans-serif;
      background-color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Flipkart Header */
    .flipkart-header {
      background: linear-gradient(90deg, #2874f0 0%, #1e56d8 100%);
      color: white;
      padding: 0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      font-size: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .flipkart-logo {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .explore-plus {
      font-size: 11px;
      opacity: 0.9;
    }

    .header-main {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      font-size: 32px;
    }

    .header-content h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .header-content p {
      font-size: 12px;
      opacity: 0.9;
    }

    /* Main Container */
    .container {
      flex: 1;
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      padding: 30px 20px;
      text-align: center;
    }

    .status-section {
      margin-bottom: 24px;
    }

    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #f0f8ff;
      border-radius: 6px;
      font-size: 13px;
      color: #2874f0;
      font-weight: 500;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      animation: pulse 2s infinite;
    }

    .status-dot.active {
      background: #ffc700;
      animation: pulse-active 0.8s ease-in-out infinite;
    }

    .status-dot.listening {
      background: #ff6161;
      animation: pulse-active 0.4s ease-in-out infinite;
    }

    .status-dot.speaking {
      background: #2874f0;
      animation: pulse-active 0.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @keyframes pulse-active {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.7; }
    }

    /* Voice Button */
    .voice-button-section {
      margin: 30px 0;
    }

    .mic-button {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 4px solid #2874f0;
      background: linear-gradient(135deg, #2874f0 0%, #1e56d8 100%);
      color: white;
      font-size: 56px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(40, 116, 240, 0.3);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .mic-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      transform: scale(0);
      transition: transform 0.6s ease-out;
    }

    .mic-button:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 25px rgba(40, 116, 240, 0.4);
    }

    .mic-button:active {
      transform: scale(0.95);
    }

    .mic-button.listening {
      background: linear-gradient(135deg, #ff6161 0%, #e63946 100%);
      border-color: #ff6161;
      box-shadow: 0 4px 15px rgba(255, 97, 97, 0.4),
                  inset 0 0 20px rgba(255, 255, 255, 0.2);
      animation: pulse-mic 0.6s ease-in-out infinite;
    }

    .mic-button.speaking {
      background: linear-gradient(135deg, #2874f0 0%, #1e56d8 100%);
      border-color: #2874f0;
      animation: pulse-mic 0.4s ease-in-out infinite;
    }

    @keyframes pulse-mic {
      0%, 100% { box-shadow: 0 4px 15px rgba(40, 116, 240, 0.3); }
      50% { box-shadow: 0 8px 30px rgba(40, 116, 240, 0.6); }
    }

    .mic-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .button-label {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
      font-weight: 500;
    }

    /* Transcript */
    .transcript-section {
      margin-top: 24px;
      text-align: left;
    }

    .transcript-label {
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .transcript {
      background: #f9f9f9;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      padding: 14px;
      min-height: 180px;
      max-height: 350px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.6;
    }

    .message {
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 6px;
      word-wrap: break-word;
    }

    .message.user {
      background: #e3f2fd;
      color: #1e56d8;
      margin-left: 12px;
      border-left: 3px solid #2874f0;
      text-align: right;
    }

    .message.agent {
      background: #fff3cd;
      color: #333;
      margin-right: 12px;
      border-left: 3px solid #ffc700;
      text-align: left;
    }

    .message-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 4px;
    }

    .empty-transcript {
      color: #999;
      text-align: center;
      padding: 40px 20px;
      font-size: 13px;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 20px;
      border: 1.5px solid #2874f0;
      background: white;
      color: #2874f0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn:hover {
      background: #f0f5ff;
      box-shadow: 0 2px 8px rgba(40, 116, 240, 0.15);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn.danger {
      border-color: #ff6161;
      color: #ff6161;
    }

    .btn.danger:hover {
      background: #ffe0e0;
    }

    /* Error Message */
    .error-message {
      background: #ffebee;
      border: 1px solid #ffcdd2;
      color: #c62828;
      padding: 12px 14px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 12px;
      display: none;
      border-left: 4px solid #c62828;
    }

    .error-message.show {
      display: block;
    }

    /* Scrollbar */
    .transcript::-webkit-scrollbar {
      width: 6px;
    }

    .transcript::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 3px;
    }

    .transcript::-webkit-scrollbar-thumb {
      background: #2874f0;
      border-radius: 3px;
    }

    .transcript::-webkit-scrollbar-thumb:hover {
      background: #1e56d8;
    }

    /* Footer */
    .footer {
      background: white;
      border-top: 1px solid #e8e8e8;
      padding: 14px 20px;
      text-align: center;
      font-size: 11px;
      color: #999;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .container {
        padding: 12px;
      }

      .card {
        padding: 20px 16px;
      }

      .mic-button {
        width: 110px;
        height: 110px;
        font-size: 44px;
      }

      .header-main {
        flex-direction: column;
        text-align: center;
      }

      .header-content h1 {
        font-size: 18px;
      }

      .transcript {
        max-height: 280px;
      }
    }
  </style>
</head>
<body>
  <!-- Flipkart Header -->
  <div class="flipkart-header">
    <div class="header-top">
      <div class="flipkart-logo">flipkart</div>
      <div class="explore-plus">Explore Plus</div>
    </div>
    <div class="header-main">
      <div class="header-icon">🎤</div>
      <div class="header-content">
        <h1>Voice Support</h1>
        <p>Speak naturally • Get instant help</p>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="container">
    <div class="card">
      <div class="status-section">
        <div class="status-indicator">
          <span class="status-dot"></span>
          <span id="status">Ready to help</span>
        </div>
      </div>

      <div class="voice-button-section">
        <button class="mic-button" id="micBtn" title="Click to speak or hold to continue speaking">🎤</button>
        <div class="button-label" id="buttonLabel">Click to speak</div>
      </div>

      <div id="errorContainer" class="error-message"></div>

      <div class="transcript-section">
        <div class="transcript-label">📝 Conversation</div>
        <div class="transcript" id="transcript">
          <div class="empty-transcript">👋 Click the microphone and speak naturally to get support for your orders</div>
        </div>
      </div>

      <div class="controls">
        <button class="btn" id="clearBtn">Clear Chat</button>
        <button class="btn danger" id="resetBtn">New Session</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    Flipkart Voice Support • 24/7 Available • Powered by Groq AI
  </div>

  <script src="app.js"></script>
</body>
</html>
