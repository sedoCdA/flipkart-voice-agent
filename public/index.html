<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flipkart Voice Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #2874f0 0%, #1f4788 100%);
      padding: 30px 20px;
      text-align: center;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .header-icon {
      font-size: 28px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .content {
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #777;
      min-height: 24px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      animation: pulse 2s infinite;
    }

    .status-dot.active {
      background: #2874f0;
      animation: pulse-active 0.6s ease-in-out;
    }

    .status-dot.listening {
      background: #ff6161;
      animation: pulse-active 0.4s ease-in-out;
    }

    .status-dot.speaking {
      background: #ffc700;
      animation: pulse-active 0.3s ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @keyframes pulse-active {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
    }

    .mic-button {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #2874f0;
      background: linear-gradient(135deg, #2874f0 0%, #1f4788 100%);
      color: white;
      font-size: 48px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(40, 116, 240, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mic-button:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 30px rgba(40, 116, 240, 0.4);
    }

    .mic-button:active {
      transform: scale(0.95);
    }

    .mic-button.listening {
      background: linear-gradient(135deg, #ff6161 0%, #e63946 100%);
      border-color: #ff6161;
      box-shadow: 0 8px 20px rgba(255, 97, 97, 0.4),
                  inset 0 0 30px rgba(255, 255, 255, 0.2);
    }

    .mic-button.speaking {
      background: linear-gradient(135deg, #ffc700 0%, #ffb100 100%);
      border-color: #ffc700;
      box-shadow: 0 8px 20px rgba(255, 199, 0, 0.4);
    }

    .mic-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .controls {
      display: flex;
      gap: 12px;
      width: 100%;
      justify-content: center;
    }

    .btn-small {
      padding: 8px 16px;
      border: 1px solid #2874f0;
      background: white;
      color: #2874f0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-small:hover {
      background: #f0f5ff;
    }

    .btn-small.clear {
      border-color: #ff6161;
      color: #ff6161;
    }

    .btn-small.clear:hover {
      background: #ffe0e0;
    }

    .transcript {
      width: 100%;
      background: #f9f9f9;
      border-radius: 8px;
      padding: 16px;
      min-height: 200px;
      max-height: 350px;
      overflow-y: auto;
      border: 1px solid #e8e8e8;
    }

    .message {
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.user {
      background: #e3f2fd;
      color: #1f4788;
      margin-left: 20px;
      border-left: 3px solid #2874f0;
    }

    .message.agent {
      background: #f5f5f5;
      color: #333;
      margin-right: 20px;
      border-left: 3px solid #ffc700;
    }

    .message-label {
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 4px;
      opacity: 0.8;
    }

    .empty-state {
      color: #999;
      text-align: center;
      font-size: 14px;
      padding: 40px 20px;
    }

    .footer {
      background: #f9f9f9;
      padding: 12px 20px;
      text-align: center;
      border-top: 1px solid #e8e8e8;
      font-size: 12px;
      color: #999;
    }

    .error-message {
      background: #ffebee;
      color: #c62828;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      border-left: 3px solid #c62828;
      font-size: 13px;
    }

    /* Scrollbar styling */
    .transcript::-webkit-scrollbar {
      width: 6px;
    }

    .transcript::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    .transcript::-webkit-scrollbar-thumb {
      background: #2874f0;
      border-radius: 10px;
    }

    .transcript::-webkit-scrollbar-thumb:hover {
      background: #1f4788;
    }

    @media (max-width: 480px) {
      .container {
        border-radius: 0;
        margin: 0 -20px;
      }

      .mic-button {
        width: 100px;
        height: 100px;
        font-size: 40px;
      }

      .header h1 {
        font-size: 20px;
      }

      .transcript {
        max-height: 250px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="header-icon">🎤</span>
      <h1>Voice Assistant</h1>
    </div>

    <div class="content">
      <div class="status-indicator">
        <span class="status-dot"></span>
        <span id="status">Ready to help</span>
      </div>

      <button class="mic-button" id="micBtn" title="Click to speak">🎤</button>

      <div class="controls">
        <button class="btn-small" id="clearBtn" title="Clear conversation">Clear</button>
        <button class="btn-small" id="resetBtn" title="Reset session">Reset</button>
      </div>

      <div id="errorContainer"></div>

      <div class="transcript" id="transcript">
        <div class="empty-state">👋 Start speaking to connect with Flipkart support</div>
      </div>
    </div>

    <div class="footer">
      Powered by Flipkart • Voice support available 24/7
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
